<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Helmet Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

:root{
--primary:#00d2ff;
--danger:#ff4757;
--success:#2ed573;
--bg:#121212;
--card-bg:rgba(30,30,30,0.9);
}

body{
margin:0;
font-family:'Segoe UI',Roboto;
background:var(--bg);
color:white;
overflow:hidden;
}

#map{
height:100vh;
width:100vw;
filter:grayscale(0.5) invert(0.9) hue-rotate(170deg);
}

/* TOP BAR */

.top-bar{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
z-index:1000;
width:90%;
display:flex;
justify-content:space-between;
}

.glass-panel{
background:var(--card-bg);
padding:10px 20px;
border-radius:15px;
display:flex;
gap:10px;
align-items:center;
}

/* SPEED */

.speed-circle{
position:absolute;
top:100px;
right:20px;
width:80px;
height:80px;
border-radius:50%;
border:4px solid var(--primary);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:var(--card-bg);
}

/* BOTTOM CARD */

.bottom-card{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:90%;
background:var(--card-bg);
padding:20px;
border-radius:25px;
}

/* ACCIDENT OVERLAY */

#accidentOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
z-index:9999;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

/* CENTER FIX */

#status-container{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:12px;
}

.timer-circle{
width:120px;
height:120px;
border:5px solid red;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
margin:20px 0;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

</style>
</head>

<body>

<div class="top-bar">

<div class="glass-panel">
<i class="fas fa-helmet-safety"></i>
<span>Helmet Linked</span>
</div>

<div class="glass-panel">
<i class="fas fa-battery-three-quarters"></i>
<span>85%</span>
</div>

</div>

<div class="speed-circle">
<span id="speed-val" style="font-size:1.5rem;font-weight:bold;">0</span>
<span style="font-size:0.6rem;">KM/H</span>
</div>

<div id="map"></div>

<div class="bottom-card">

<div style="display:flex;justify-content:space-between;text-align:center;margin-bottom:20px">

<div>
<b id="dist-val">0.0</b>
<div>Distance</div>
</div>

<div>
<b id="time-val">00:00</b>
<div>Ride Time</div>
</div>

<div>
<b>28°C</b>
<div>Weather</div>
</div>

</div>

<div style="flex:1; display:flex; gap:10px">

<button style="background:#ff4757;color:white;border:none;padding:15px;border-radius:12px;width:60px" onclick="triggerAccidentManual()">
<i class="fas fa-phone-alt"></i>
</button>

<button id="mainBtn" style="flex:1;background:#2ed573;color:white;border:none;padding:15px;border-radius:12px" onclick="showHelmetPopup()">
START RIDE
</button>

</div>

</div>

<div id="helmet-popup" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#111;border:2px solid #00d2ff;padding:30px;border-radius:20px;text-align:center;z-index:9999">
<h2>Helmet Connected</h2>
<p>Safe Ride Enabled</p>
</div>

<div id="accidentOverlay">
<h1 style="color:red">🚨 ACCIDENT DETECTED</h1>

<div id="status-container">

<p>Sending emergency alert in</p>

<div class="timer-circle" id="timer">5</div>

<button onclick="cancelAlert()" 
style="padding:10px 20px;border:none;border-radius:20px;background:white;color:black;">
I AM SAFE
</button>

</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let map=L.map('map').setView([28.6139,77.2090],13)

let riderMarker
let destMarker
let routeLine
let watchID

let startTime
let timerInterval
let lastSpeed=0
let countdown

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

// Get Initial Position
navigator.geolocation.getCurrentPosition(p=>{
let loc=[p.coords.latitude,p.coords.longitude]
map.setView(loc,15)
riderMarker=L.marker(loc).addTo(map)
})

function showHelmetPopup(){
let popup=document.getElementById("helmet-popup")
popup.style.display="block"
setTimeout(()=>{
popup.style.display="none"
startRide()
},2000)
}

function startRide(){
startTime=Date.now()
document.getElementById("mainBtn").innerText="STOP RIDE"
document.getElementById("mainBtn").onclick=stopRide
timerInterval=setInterval(updateTimer,1000)

watchID=navigator.geolocation.watchPosition(p=>{
let pos=[p.coords.latitude,p.coords.longitude]
let speed=Math.round((p.coords.speed||0)*3.6)
document.getElementById("speed-val").innerText=speed
riderMarker.setLatLng(pos)
map.flyTo(pos,17)

if(lastSpeed>8 && speed<1){
triggerAccidentManual()
}
lastSpeed=speed
})
}

function stopRide(){
navigator.geolocation.clearWatch(watchID)
clearInterval(timerInterval)
map.setZoom(13)
document.getElementById("mainBtn").innerText="START RIDE"
document.getElementById("mainBtn").onclick=showHelmetPopup
}

function updateTimer(){
let diff=Math.floor((Date.now()-startTime)/1000)
let m=Math.floor(diff/60).toString().padStart(2,'0')
let s=(diff%60).toString().padStart(2,'0')
document.getElementById("time-val").innerText=`${m}:${s}`
}

map.on('click',e=>{
if(destMarker)map.removeLayer(destMarker)
destMarker=L.marker(e.latlng).addTo(map)
if(routeLine)map.removeLayer(routeLine)
routeLine=L.polyline([riderMarker.getLatLng(),e.latlng],{
color:'#00d2ff',
weight:6
}).addTo(map)
let d=(riderMarker.getLatLng().distanceTo(e.latlng)/1000).toFixed(1)
document.getElementById("dist-val").innerText=d
})

function triggerAccidentManual(){
document.getElementById("accidentOverlay").style.display="flex"

let timeLeft=5
document.getElementById("timer").innerText=timeLeft

countdown=setInterval(()=>{
timeLeft--
document.getElementById("timer").innerText=timeLeft

if(timeLeft<=0){
clearInterval(countdown)
sendEmergency()
}
},1000)
}

function cancelAlert(){
clearInterval(countdown)
document.getElementById("accidentOverlay").style.display="none"
}

function sendEmergency(){
navigator.geolocation.getCurrentPosition(p=>{
let lat=p.coords.latitude.toFixed(6)
let lng=p.coords.longitude.toFixed(6)

document.getElementById("status-container").innerHTML=`
<h2 style="color:#2ed573">ALERT SENT!</h2>
<p>I am here at:</p>
<p style="background:rgba(255,255,255,0.1);padding:10px;border-radius:10px">
Lat: ${lat}<br>Long: ${lng}
</p>
<button onclick="cancelAlert()" style="margin-top:20px;padding:10px 20px;border:none;border-radius:10px;background:white;color:black">BACK</button>
`
})
}
async function sendEmergency(){

navigator.geolocation.getCurrentPosition(async (p)=>{

let lat = p.coords.latitude.toFixed(6)
let lng = p.coords.longitude.toFixed(6)

let mapLink = `https://www.google.com/maps?q=${lat},${lng}`

let address="Loading address..."

try{

let res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`)
let data = await res.json()

address = data.display_name

}catch(err){

address="Address not available"

}

document.getElementById("status-container").innerHTML=`

<h2 style="color:#2ed573">🚨 ALERT SENT!</h2>

<p><b>Accident Location</b></p>

<div style="
background:rgba(255,255,255,0.1);
padding:15px;
border-radius:12px;
max-width:320px;
line-height:1.5">

<b>Address:</b><br>
${address}
<br><br>

<b>Latitude:</b> ${lat}<br>
<b>Longitude:</b> ${lng}

</div>

<br>

<a href="${mapLink}" target="_blank"
style="
background:#00d2ff;
padding:12px 22px;
border-radius:10px;
color:black;
text-decoration:none;
font-weight:bold;
display:inline-block">

📍 OPEN LIVE LOCATION

</a>

<br><br>

<button onclick="cancelAlert()" 
style="
padding:10px 20px;
border:none;
border-radius:10px;
background:white;
color:black">

BACK

</button>

`

})

}

</script>

</body>
</html>
